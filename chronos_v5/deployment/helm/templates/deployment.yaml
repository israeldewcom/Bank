apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chronos.fullname" . }}
  labels:
    app: {{ include "chronos.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "chronos.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "chronos.name" . }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}/{{ .Values.postgres.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
            - name: CELERY_BROKER_URL
              value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/2"
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
